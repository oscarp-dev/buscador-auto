<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Autos</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1>Buscador de Autos</h1>
            <p>Encuentra tu próximo vehículo</p>
        </div>
        <span class="badge">JS Project</span>
    </div>

    <div class="contenedor">

        <aside class="sidebar">
            <p class="sidebar-title">Filtros</p>

            <div class="field">
                <label for="marca">Marca</label>
                <select id="marca">
                    <option value="">Todas</option>
                    <option value="Audi">Audi</option>
                    <option value="BMW">BMW</option>
                    <option value="Mercedes Benz">Mercedes Benz</option>
                    <option value="Chevrolet">Chevrolet</option>
                    <option value="Ford">Ford</option>
                    <option value="Dodge">Dodge</option>
                </select>
            </div>

            <div class="field">
                <label for="year">Año</label>
                <select id="year">
                    <option value="">Todos</option>
                </select>
            </div>

            <div class="field">
                <label for="minimo">Precio mínimo</label>
                <select id="minimo">
                    <option value="">Sin mínimo</option>
                    <option value="20000">$20,000</option>
                    <option value="30000">$30,000</option>
                    <option value="40000">$40,000</option>
                    <option value="50000">$50,000</option>
                    <option value="60000">$60,000</option>
                    <option value="70000">$70,000</option>
                    <option value="80000">$80,000</option>
                    <option value="90000">$90,000</option>
                </select>
            </div>

            <div class="field">
                <label for="maximo">Precio máximo</label>
                <select id="maximo">
                    <option value="">Sin máximo</option>
                    <option value="20000">$20,000</option>
                    <option value="30000">$30,000</option>
                    <option value="40000">$40,000</option>
                    <option value="50000">$50,000</option>
                    <option value="60000">$60,000</option>
                    <option value="70000">$70,000</option>
                    <option value="80000">$80,000</option>
                    <option value="90000">$90,000</option>
                </select>
            </div>

            <div class="field">
                <label for="puertas">Puertas</label>
                <select id="puertas">
                    <option value="">Todas</option>
                    <option value="2">2 puertas</option>
                    <option value="4">4 puertas</option>
                </select>
            </div>

            <div class="field">
                <label for="transmision">Transmisión</label>
                <select id="transmision">
                    <option value="">Todas</option>
                    <option value="automatico">Automática</option>
                    <option value="manual">Manual</option>
                </select>
            </div>

            <div class="field">
                <label for="color">Color</label>
                <select id="color">
                    <option value="">Todos</option>
                    <option value="Negro">Negro</option>
                    <option value="Azul">Azul</option>
                    <option value="Blanco">Blanco</option>
                    <option value="Rojo">Rojo</option>
                </select>
            </div>
        </aside>

        <main class="results-area">
            <div class="results-header">
                <p class="results-title">Resultados</p>
                <span class="results-count" id="count">— vehículos</span>
            </div>
            <div id="resultado"></div>
        </main>

    </div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
